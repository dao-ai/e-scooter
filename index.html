<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>电摩情报站</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="rail" aria-label="主导航">
        <a class="brand" href="#" aria-label="电摩情报站首页">
          <span class="brand-mark">V</span>
          <span>电摩情报站</span>
        </a>
        <nav class="nav-list">
          <a class="nav-item is-active" href="#overview" aria-label="总览">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 13h7V4H4v9Zm0 7h7v-5H4v5Zm9 0h7v-9h-7v9Zm0-16v5h7V4h-7Z"/></svg>
            <span>总览</span>
          </a>
          <a class="nav-item" href="#models" aria-label="车型库">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 16.6A3.4 3.4 0 1 0 3.2 20a3.4 3.4 0 0 0 3.4-3.4Zm14.2 0A3.4 3.4 0 1 0 17.4 20a3.4 3.4 0 0 0 3.4-3.4ZM7.9 6.1h4.6l2.4 5.7h-4.1L7.9 6.1Zm6.5-2H7.2c-.8 0-1.3.8-1 1.5l3.9 7.8c.2.4.6.6 1 .6h5.2c.8 0 1.3-.8 1-1.5l-2.9-7.8c-.1-.4-.5-.6-1-.6Zm-2.7 9.3h-2a5.7 5.7 0 0 0-2.4-3L5.9 7.6 4.1 8.5l1.5 3A5.4 5.4 0 0 0 3.2 11a5.6 5.6 0 1 0 5.5 6.3h3.1v-3.9Zm5.6-2.4c-.7 0-1.3.1-1.9.4l.8 2.1c.3-.1.7-.2 1.1-.2a3.4 3.4 0 0 1 3.2 2.3h2.3a5.6 5.6 0 0 0-5.5-4.6Z"/></svg>
            <span>车型库</span>
          </a>
          <a class="nav-item" href="#news" aria-label="资讯">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h12a2 2 0 0 1 2 2v11.5A2.5 2.5 0 0 1 16.5 20h-11A2.5 2.5 0 0 1 3 17.5V6a2 2 0 0 1 2-2Zm0 2v11.5c0 .3.2.5.5.5h11c.3 0 .5-.2.5-.5V6H5Zm2 2h8v4H7V8Zm0 6h8v2H7v-2Z"/></svg>
            <span>资讯</span>
          </a>
          <a class="nav-item" href="#charging" aria-label="补能">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h7a2 2 0 0 1 2 2v14h-2v-4H6v4H4V5a2 2 0 0 1 2-2Zm0 2v8h7V5H6Zm11.7 1 2.8 4.2c.6.9.4 2.1-.5 2.8l-1 .8V20h-2v-7.2l1.8-1.4-2.8-4.2L17.7 6Z"/></svg>
            <span>补能</span>
          </a>
        </nav>
      </aside>

      <main>
        <header class="topbar">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 19.6-4.7-4.7a7.2 7.2 0 1 0-1.4 1.4l4.7 4.7 1.4-1.4ZM5 10.7a5.7 5.7 0 1 1 11.4 0A5.7 5.7 0 0 1 5 10.7Z"/></svg>
            <input id="searchInput" type="search" placeholder="搜索车型、品牌、关键词" autocomplete="off">
          </div>
          <div class="top-actions">
            <button class="icon-button" id="refreshBtn" type="button" aria-label="刷新数据">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 0 1-13.7 5.7l1.4-1.4A6 6 0 1 0 6 12H3l4-4 4 4H8a4 4 0 1 1 1.2 2.8l-1.4 1.4A6 6 0 1 0 18 12h2Z"/></svg>
              <span class="tooltip">刷新数据</span>
            </button>
            <button class="button primary" type="button" id="compareJump">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h6v16H5V4Zm8 4h6v12h-6V8Z"/></svg>
              对比
              <span id="compareCount">0</span>
            </button>
          </div>
        </header>

        <section class="overview" id="overview">
          <div class="overview-copy">
            <div class="eyebrow">Electric Moto Intelligence</div>
            <h1>电动摩托车信息聚合看板</h1>
            <p>聚合车型参数、价格带、口碑趋势、补能网络和政策动态，适合做选购、内容发布与渠道监控。</p>
            <div class="metric-row" aria-label="关键指标">
              <div>
                <strong id="metricModels">0</strong>
                <span>收录车型</span>
              </div>
              <div>
                <strong id="metricAvgRange">0</strong>
                <span>平均续航 km</span>
              </div>
              <div>
                <strong id="metricFastCharge">0%</strong>
                <span>快充覆盖</span>
              </div>
            </div>
          </div>
          <figure class="visual-panel">
            <img src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Can-Am_electric_motorcycle_EICMA_2024.jpg" alt="展台上的 Can-Am 电动摩托车">
            <figcaption>Photo: <a href="https://commons.wikimedia.org/wiki/File:Can-Am_electric_motorcycle_EICMA_2024.jpg">AVMOTO / Wikimedia Commons</a>, <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a></figcaption>
          </figure>
        </section>

        <section class="section-band filters-band" aria-label="筛选器">
          <div class="segmented" role="group" aria-label="用途筛选">
            <button class="segment is-active" type="button" data-filter="all">全部</button>
            <button class="segment" type="button" data-filter="commute">通勤</button>
            <button class="segment" type="button" data-filter="performance">性能</button>
            <button class="segment" type="button" data-filter="delivery">配送</button>
          </div>
          <label class="select-field">
            <span>价格带</span>
            <select id="priceFilter">
              <option value="all">全部</option>
              <option value="low">8000 以下</option>
              <option value="mid">8000-15000</option>
              <option value="high">15000 以上</option>
            </select>
          </label>
          <label class="range-field">
            <span>最低续航 <b id="rangeValue">60</b> km</span>
            <input id="rangeFilter" type="range" min="40" max="180" step="10" value="60">
          </label>
          <label class="toggle-field">
            <input id="chargingFilter" type="checkbox">
            <span>仅看快充/换电</span>
          </label>
        </section>

        <div class="content-grid">
          <section class="model-section" id="models">
            <div class="section-heading">
              <div>
                <span class="eyebrow">Model Library</span>
                <h2>车型库</h2>
              </div>
              <span class="result-count" id="resultCount">0 款</span>
            </div>
            <div class="model-grid" id="modelGrid"></div>
          </section>

          <aside class="side-stack" aria-label="右侧信息">
            <section class="panel compare-panel" id="comparePanel">
              <div class="section-heading compact">
                <div>
                  <span class="eyebrow">Compare</span>
                  <h2>快速对比</h2>
                </div>
                <button class="ghost-button" id="clearCompare" type="button">清空</button>
              </div>
              <div class="compare-list" id="compareList"></div>
            </section>

            <section class="panel trend-panel">
              <div class="section-heading compact">
                <div>
                  <span class="eyebrow">Trend</span>
                  <h2>热度趋势</h2>
                </div>
              </div>
              <div class="trend-list" id="trendList"></div>
            </section>
          </aside>
        </div>

        <section class="section-band news-band" id="news">
          <div class="section-heading">
            <div>
              <span class="eyebrow">News Feed</span>
              <h2>资讯流</h2>
            </div>
            <div class="chip-row" id="newsTabs" role="group" aria-label="资讯分类">
              <button class="chip is-active" type="button" data-news="all">全部</button>
              <button class="chip" type="button" data-news="launch">新车</button>
              <button class="chip" type="button" data-news="policy">政策</button>
              <button class="chip" type="button" data-news="tech">技术</button>
            </div>
          </div>
          <div class="news-grid" id="newsGrid"></div>
        </section>

        <section class="bottom-grid" id="charging">
          <div class="panel charging-panel">
            <div class="section-heading compact">
              <div>
                <span class="eyebrow">Charging</span>
                <h2>城市补能指数</h2>
              </div>
            </div>
            <div class="city-list" id="cityList"></div>
          </div>
          <div class="panel source-panel">
            <div class="section-heading compact">
              <div>
                <span class="eyebrow">Sources</span>
                <h2>数据源队列</h2>
              </div>
            </div>
            <div class="source-list">
              <div><span>厂商公告</span><b>16</b></div>
              <div><span>试驾内容</span><b>42</b></div>
              <div><span>社区口碑</span><b>128</b></div>
              <div><span>补能站点</span><b>76</b></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
