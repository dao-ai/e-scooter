<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="speedLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="600" height="400" fill="url(#bg)" rx="8"/>

  <!-- 网格 --> 
  <g stroke="#334155" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
  </g>

  <!-- 光晕 -->
  <ellipse cx="300" cy="200" rx="250" ry="180" fill="url(#glow)"/>

  <!-- 速度线 -->
  <line x1="0" y1="180" x2="240" y2="180" stroke="url(#speedLine)" stroke-width="2">
    <animate attributeName="x1" from="600" to="-60" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="220" x2="180" y2="220" stroke="url(#speedLine)" stroke-width="1.5">
    <animate attributeName="x1" from="550" to="-80" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="260" x2="300" y2="260" stroke="url(#speedLine)" stroke-width="1">
    <animate attributeName="x1" from="650" to="-40" dur="2.5s" repeatCount="indefinite"/>
  </line>

  <!-- 摩托车主体 -->
  <g transform="translate(180, 120) scale(1.1)">
    <!-- 阴影 -->
    <ellipse cx="100" cy="230" rx="80" ry="10" fill="#000" opacity="0.3"/>

    <!-- 后轮 -->
    <circle cx="50" cy="200" r="35" stroke="#475569" stroke-width="4" fill="none"/>
    <circle cx="50" cy="200" r="28" stroke="#334155" stroke-width="1" fill="#1e293b"/>
    <circle cx="50" cy="200" r="8" fill="#475569"/>
    <!-- 轮毂辐条 -->
    <line x1="50" y1="172" x2="50" y2="228" stroke="#475569" stroke-width="1.5"/>
    <line x1="22" y1="200" x2="78" y2="200" stroke="#475569" stroke-width="1.5"/>
    <line x1="30" y1="180" x2="70" y2="220" stroke="#475569" stroke-width="1.5"/>
    <line x1="30" y1="220" x2="70" y2="180" stroke="#475569" stroke-width="1.5"/>

    <!-- 前轮 -->
    <circle cx="160" cy="200" r="35" stroke="#475569" stroke-width="4" fill="none"/>
    <circle cx="160" cy="200" r="28" stroke="#334155" stroke-width="1" fill="#1e293b"/>
    <circle cx="160" cy="200" r="8" fill="#475569"/>
    <line x1="160" y1="172" x2="160" y2="228" stroke="#475569" stroke-width="1.5"/>
    <line x1="132" y1="200" x2="188" y2="200" stroke="#475569" stroke-width="1.5"/>
    <line x1="140" y1="180" x2="180" y2="220" stroke="#475569" stroke-width="1.5"/>
    <line x1="140" y1="220" x2="180" y2="180" stroke="#475569" stroke-width="1.5"/>

    <!-- 车身底盘 -->
    <path d="M40 180 L70 155 L120 155 L150 170 L170 175 L180 190 L160 200 L45 200 Z" fill="#3b82f6"/>
    <path d="M40 180 L70 155 L120 155 L150 170 L170 175" fill="none" stroke="#60a5fa" stroke-width="2"/>

    <!-- 座椅 -->
    <rect x="75" y="145" width="55" height="14" rx="6" fill="#1e293b"/>
    <rect x="75" y="145" width="55" height="5" rx="3" fill="#334155"/>

    <!-- 车尾 -->
    <path d="M35 180 L20 190 L20 210 L40 205 Z" fill="#2563eb" opacity="0.8"/>

    <!-- 尾灯 -->
    <rect x="18" y="192" width="6" height="8" rx="2" fill="#ef4444"/>
    <ellipse cx="21" cy="196" rx="3" ry="4" fill="#fca5a5" opacity="0.6"/>

    <!-- 前叉 -->
    <line x1="155" y1="175" x2="160" y2="200" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <line x1="155" y1="175" x2="160" y2="200" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>

    <!-- 车前灯 -->
    <rect x="170" y="178" width="18" height="12" rx="4" fill="#fef08a" opacity="0.9"/>
    <rect x="170" y="178" width="18" height="12" rx="4" fill="none" stroke="#475569" stroke-width="2"/>
    <!-- 灯光效果 -->
    <ellipse cx="195" cy="184" rx="15" ry="6" fill="#fef08a" opacity="0.3"/>
    <ellipse cx="205" cy="184" rx="10" ry="4" fill="#fef08a" opacity="0.15"/>

    <!-- 车把 -->
    <path d="M155 162 L175 145 L185 145" stroke="#475569" stroke-width="4" stroke-linecap="round" fill="none"/>
    <rect x="182" y="142" width="10" height="6" rx="3" fill="#334155"/>

    <!-- 仪表盘 -->
    <rect x="145" y="158" width="20" height="10" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <rect x="148" y="161" width="14" height="4" rx="1" fill="#3b82f6" opacity="0.8"/>

    <!-- 电机 -->
    <ellipse cx="105" cy="175" rx="12" ry="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="105" y="179" text-anchor="middle" fill="#3b82f6" font-size="8" font-weight="bold">⚡</text>

    <!-- 刹车盘 -->
    <circle cx="160" cy="200" r="18" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
    <circle cx="50" cy="200" r="18" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>

    <!-- 车身装饰条纹 -->
    <line x1="70" y1="165" x2="130" y2="165" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
    <line x1="70" y1="170" x2="130" y2="170" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- 标题文字 -->
  <g transform="translate(300, 310)">
    <text x="0" y="0" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="800" font-family="sans-serif" letter-spacing="2">
      电摩情报站
    </text>
    <text x="0" y="22" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif" letter-spacing="3">
      ELECTRIC MOTO INTELLIGENCE
    </text>
  </g>

  <!-- 数据标签 -->
  <g transform="translate(50, 310)">
    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="#3b82f6" opacity="0.2"/>
    <text x="0" y="4" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold" font-family="sans-serif">
      <!-- 品牌 -->
      13 品牌
    </text>
  </g>
  <g transform="translate(190, 310)">
    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="#10b981" opacity="0.2"/>
    <text x="0" y="4" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold" font-family="sans-serif">
      <!-- 车型 -->
      75+ 车型
    </text>
  </g>
  <g transform="translate(330, 310)">
    <rect x="-50" y="-12" width="100" height="24" rx="12" fill="#8b5cf6" opacity="0.2"/>
    <text x="0" y="4" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold" font-family="sans-serif">
      <!-- 数据 -->
      API 数据
    </text>
  </g>
  <g transform="translate(470, 310)">
    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="#f59e0b" opacity="0.2"/>
    <text x="0" y="4" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="bold" font-family="sans-serif">
      <!-- 更新 -->
      持续更新
    </text>
  </g>
</svg>
